# Render Blueprint — one-click deploy for the Laravel API.
# Apply via Render dashboard: New + -> Blueprint -> point to this repo.
#
# After deploy, fill in the secret env vars in the Render dashboard:
#   GEMINI_API_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
#   FRONTEND_URL (e.g. https://johnny77585.github.io)
#   GOOGLE_REDIRECT_URI (e.g. https://fit-ai-api.onrender.com/api/auth/google/callback)

databases:
  - name: fit-ai-db
    plan: free
    databaseName: fit_ai
    user: fit_ai

services:
  - type: web
    name: fit-ai-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: "Fit AI API"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: fit-ai-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: fit-ai-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: fit-ai-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: fit-ai-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fit-ai-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: none
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: BROADCAST_CONNECTION
        value: log
      - key: FILESYSTEM_DISK
        value: local
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: FRONTEND_URL
        sync: false
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
